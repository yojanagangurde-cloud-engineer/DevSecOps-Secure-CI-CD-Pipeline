name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  security-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      actions: write

    steps:

# Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

# setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

# Install dependencies
      - name: Install Requirements
        run: |
          pip install -r flask-app/requirements.txt

# Run Bandit Scan
      - name: Run Bandit Scan
        run: |
          pip install bandit
          bandit -r flask-app/ --exit-zero

# Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t flask-app ./flask-app

# Run Trivy Scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-app
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

# Install Checkov
      - name: Install Checkov
        run: |
          pip install checkov

# Run Checkov Scan on Terraform
      - name: Run Checkov Scan
        run: |
          checkov -d terraform/ --soft-fail

# Login to Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# Build and Push Docker Image
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./flask-app
          push: true
          platforms: linux/amd64
          tags: yojana20/flask-shop:latest

# Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            docker stop flask-app || true
            docker rm -f flask-app || true

            docker pull yojana20/flask-shop:latest


            docker run -d \
              --name flask-app \
              -p 5001:5001 \
              --user root \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              yojana20/flask-shop:latest

# Wait for Application to be Ready
      - name: Wait for Application startup
        run: |
          sleep 40
          curl -f http://${{ secrets.EC2_HOST }}:5001 || exit 1

# Install Nmap
      - name: Install Nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap

# Run Nmap Scan
      - name: Run Nmap Scan
        run: |
          nmap -p 5001 ${{ secrets.EC2_HOST }}