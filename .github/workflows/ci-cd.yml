name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read
      actions: write

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install requirements
      run: pip install -r flask-app/requirements.txt

    - name: Run Bandit Security Scan
      run: |
        pip install bandit
        bandit -r flask-app/ --exit-zero

    - name: Build Docker image
      run: docker build -t flask-app ./flask-app

    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: flask-app
        severity: CRITICAL,HIGH
        format: table
        exit-code: 0

    - name: Install Checkov
      run: pip install checkov

    - name: Scan Terraform
      run: checkov -d terraform/

    - name: Run Flask Container
      run: |
        docker build -t flask-app ./flask-app
        docker run -d \
          -p 5001:5001 \
          --name flask-app \
          -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
          -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          flask-app

